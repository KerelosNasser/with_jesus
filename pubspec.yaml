name: with_jesus
description: "مع يسوع — A Digital Spiritual Retreat for Orthodox Christians. Helps practice الخلوة by reducing distractions, not increasing engagement."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0

  # State management + DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Local database (Drift / SQLite)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  sqlite3: ^2.7.4
  path: ^1.9.0

  # Key-value preferences
  shared_preferences: ^2.3.3

  # Secure storage (Android Keystore)
  flutter_secure_storage: ^9.2.4

  # Encryption (AES-256-GCM for journal)
  cryptography: ^2.7.0

  # Audio playback (offline, local URIs, ExoPlayer/AVAudioPlayer)
  just_audio: ^0.9.40

  # Reactive stream combinators (combineLatest3 for position streams)
  rxdart: ^0.28.0

  # Audio background / media session / notification
  audio_service: ^0.18.15

  # Filesystem
  path_provider: ^2.1.5
  file_picker: 11.0.2

  # Permissions
  permission_handler: ^11.3.1

  # Internationalization
  intl: ^0.20.2

  # Immutable state models
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2
  freezed: ^2.5.7
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0

  # Drift dev tools
  drift_dev: ^2.22.1

  # Testing
  mocktail: ^1.0.4
  patrol: ^3.15.2

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/ambience/
